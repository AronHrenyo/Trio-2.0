<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Partnerek</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="C:\trio2.0\Trio-2.0\warehouse-management\src\main\resources\static\css\base.css">
</head>
<body>
<!-- Insert navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <h1>Partners</h1>

    <!-- Filter Form -->
    <form th:action="@{/partner-view}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <label for="name" class="form-label">Partner Name:</label>
            <input type="text" id="name" name="name" th:value="${name}" class="form-control" placeholder="Search by name"/>
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary">Filter</button>
            <a th:href="@{/partner-view}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <!-- Partners Table -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>#</th>
            <th>Partner Name</th>
            <th>Email</th>
            <th>Telephone</th>
            <th>Address</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="partner, iterStat : ${partners}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${partner.partnerName}"></td>
            <td th:text="${partner.partnerEmail}"></td>
            <td th:text="${partner.partnerTelephone}"></td>
            <td th:text="${partner.partnerAddress}"></td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Insert footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
