<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Raktárak térképen</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8"/>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>
<!-- Insert navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<h2>Raktárak: </h2>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // 🗺️ Térkép inicializálása (Budapest középpont)
    const map = L.map('map').setView([47.4979, 19.0402], 7);

    // 🌍 OpenStreetMap layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 📦 Raktárak betöltése backendről
    fetch('/api/warehouses')
        .then(response => response.json())
        .then(data => {

            data.forEach(w => {

                // ⚠️ csak akkor rakjuk ki, ha van koordináta
                if (w.lat && w.lon) {

                    const marker = L.marker([w.lat, w.lon]).addTo(map);

                    // 💬 Popup
                    marker.bindPopup(`
                        <b>${w.warehouseName}</b><br/>
                        Kapacitás: ${w.warehouseCapacity}
                    `);
                }
            });

        })
        .catch(err => console.error("Hiba:", err));
</script>

<!-- Insert footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
