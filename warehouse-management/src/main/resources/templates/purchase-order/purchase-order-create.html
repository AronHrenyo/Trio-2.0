<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Purchase Order</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<!-- Insert navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">
    <h1 class="mb-4">Create New Purchase Order</h1>

    <form th:action="@{/purchase-order-create}" th:object="${purchaseOrder}" method="post">
        <div class="mb-3">
            <label for="orderNumber" class="form-label">Order Number</label>
            <input type="text" th:field="*{purchaseOrderNumber}" class="form-control" id="orderNumber" placeholder="Enter order number" required>
        </div>

        <div class="mb-3">
            <label for="orderDate" class="form-label">Order Date</label>
            <input type="date" th:field="*{purchaseOrderDate}" class="form-control" id="orderDate" required>
        </div>

        <div class="mb-3">
            <label for="partner" class="form-label">Partner</label>
            <select th:field="*{partner}" class="form-select" id="partner" required>
                <option th:each="p : ${partners}" th:value="${p.partnerId}" th:text="${p.partnerName}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <input type="text" th:field="*{purchaseOrderStatus}" class="form-control" id="status" placeholder="Enter order status" required>
        </div>

        <div class="mb-3">
            <label for="vatSum" class="form-label">VAT</label>
            <input type="number" step="0.01" th:field="*{purchaseOrderVatSum}" class="form-control" id="vatSum" placeholder="Enter VAT">
        </div>

        <button type="submit" class="btn btn-primary">Save Purchase Order</button>
        <a th:href="@{/purchase-order-view}" class="btn btn-secondary ms-2">Back to List</a>
    </form>
</div>

<!-- Insert footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
